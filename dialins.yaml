- bean: "Forte"
  roaster: "Jewel Coffee Cafe Monza"
  method: espresso
  dose_g: 18
  yield_g: 35
  time_s: 30
  grind(K6): 26
  notes: "Medium roast, little to no acidity with great body and crema. Chocolate notes, not much pepper."

- bean: "Veloce"
  roaster: "Jewel Coffee Cafe Monza"
  method: espresso
  dose_g: 18
  yield_g: 50
  time_s: 32
  grind(K6): 25
  notes: "Medium roast, pretty standard espresso. A little spiciness."

- bean: "Espresso"
  roaster: "Lavazza"
  method: espresso
  dose_g: 18
  yield_g: 32
  time_s: 28
  grind(K6): 29
  notes: "Medium roast, a little acidity. Perhaps mess with yield further."

- bean: "Espresso Barista Gran Crema"
  roaster: "Lavazza"
  method: espresso
  dose_g: 18
  yield_g: 36
  time_s: 28
  grind(Breville): 7-8
  grind(K6): 28
  notes: "City roast with no bitterness, very round but light body."

- bean: "Grizzly Claw"
  roaster: "Kick Horse"
  method: espresso
  dose_g: 16
  yield_g: 30
  time_s: 28
  grind: 14-15
  notes: "Dark roast with little bitterness, very round body."

- bean: "Guatemala"
  roaster: "Illy"
  method: espresso
  dose_g: 18
  yield_g: 35
  time_s: 25-26
  grind: 7-8
  notes: "Standard taste profile, with a hint of chocolate."

- bean: "Sagada Arabica"
  roaster: "Capital Grains"
  method: espresso
  dose_g: 16
  yield_g: 35
  time_s: 25-26
  grind: 7
  notes: "Standard taste profile, slightly stronger on the caramel side. Grind size subject to change, roast date 26/02/18. Grind size adjusted from previous dial-ins due to flat portafilter basket size."

- bean: "Colombia Test Roast"
  roaster: "20grams"
  method: espresso
  dose_g: 18
  yield_g: 54
  time_s: 28-32
  grind: 3
  notes: "As this is a very light roast, more extraction volume and time are needed."

- bean: "CyTEC Beans"
  roaster: "Daiou"
  method: espresso
  dose_g: 18
  yield_g: 45
  time_s: 25-26
  grind: 10
  notes: "Super dark bean, hints of charcoal with no flowers nor fruits to be found. Perhaps chocolate."

- bean: "Barista Beans"
  roaster: "Bo's"
  method: espresso
  dose_g: 18
  yield_g: 45
  time_s: 25-26
  grind: 5
  notes: "Weird roast, medium-dark blend but has nothing but nutty notes and perhaps more charcoal than even CyTEC beans."

